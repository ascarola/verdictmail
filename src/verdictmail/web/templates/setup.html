<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup — VerdictMail</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0d1117; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow-lg" style="width:400px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi bi-shield-shaded text-primary" style="font-size:2.5rem"></i>
      <h4 class="mt-2 mb-0 fw-bold">VerdictMail Setup</h4>
      <p class="text-muted small mb-0">First-time configuration</p>
    </div>

    <div class="alert alert-info small mb-3">
      <i class="bi bi-info-circle-fill me-1"></i>
      No web UI password has been set yet. Create one now to secure access to this interface.
      Minimum 8 characters.
    </div>

    {% if error %}
    <div class="alert alert-danger small py-2 mb-3">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label">New password</label>
        <input type="password" name="password" class="form-control"
          autofocus autocomplete="new-password" required minlength="8">
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm password</label>
        <input type="password" name="confirm" class="form-control"
          autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-check-circle me-1"></i> Set Password &amp; Continue
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
